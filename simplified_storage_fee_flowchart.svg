<path d="M 900 2338 L 900 2410" fill="none" stroke="#222" stroke-width="2.2" marker-end="url(#arrow)"/>

<rect id="f2" x="640.0" y="2410" width="520" height="105" rx="10" fill="#f8fafc" stroke="#222" stroke-width="2"/>
