<text x="830" y="1345" font-size="19" text-anchor="middle" dominant-baseline="middle" class="txt" font-weight="700">No</text>


<polygon points="900,1470.0 1170.0,1560 900,1650.0 630.0,1560" fill="#fff7ed" stroke="#222" stroke-width="2"/>
