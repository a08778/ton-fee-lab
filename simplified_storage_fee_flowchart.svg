<rect width="1800" height="5750" fill="white"/>
<text x="900" y="70" text-anchor="middle" font-size="36" class="title">TON storage fee mechanism — simplified flow</text>


<rect x="110" y="130" width="520" height="440" rx="10" fill="#f0fdf4" stroke="#3f6212" stroke-width="2"/>
<text font-size="21" class="txt"><tspan x="138" y="172.0">Entry Values</tspan><tspan x="138" y="200.35"></tspan><tspan x="138" y="228.7">Contract</tspan><tspan x="138" y="257.05">• balance</tspan><tspan x="138" y="285.4">• due_payment</tspan><tspan x="138" y="313.75">• last_paid</tspan><tspan x="138" y="342.1">• state</tspan><tspan x="138" y="370.45000000000005"></tspan><tspan x="138" y="398.8">Incoming message</tspan><tspan x="138" y="427.15">• value</tspan><tspan x="138" y="455.5">• bounceable</tspan><tspan x="138" y="483.85"></tspan><tspan x="138" y="512.2">May be NULL</tspan><tspan x="138" y="540.55">(e.g. tick/tock transactions)</tspan></text>


<rect x="1170" y="130" width="520" height="175" rx="10" fill="#f0fdf4" stroke="#3f6212" stroke-width="2"/>
<text font-size="21" class="txt"><tspan x="1198" y="172.0">Key ordering rule</tspan><tspan x="1198" y="200.35"></tspan><tspan x="1198" y="228.7">Bounceable: STORAGE → CREDIT</tspan><tspan x="1198" y="257.05">Non-bounceable: CREDIT → STORAGE</tspan><tspan x="1198" y="285.4">Tick/tock: no incoming value</tspan></text>


