<text x="1235" y="1132" font-size="19" text-anchor="middle" dominant-baseline="middle" class="txt" font-weight="700">Yes</text>


<rect id="m2" x="1030" y="1240" width="520" height="78" rx="10" fill="#f8fafc" stroke="#222" stroke-width="2"/>
